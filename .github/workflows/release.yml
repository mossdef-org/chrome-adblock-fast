name: Build and Release Chrome Extension

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Generate icons
        run: node scripts/generate-icons.js

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create packed extension (zip)
        run: |
          zip -r "chrome-adblock-fast-${{ steps.version.outputs.version }}.zip" \
            manifest.json \
            background.js \
            popup/ \
            settings/ \
            lib/ \
            icons/ \
            PRIVACY.md \
            LICENSE \
            -x '*.git*' 'scripts/*' 'node_modules/*'

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: chrome-adblock-fast-${{ steps.version.outputs.version }}
          path: chrome-adblock-fast-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/pull/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          files: chrome-adblock-fast-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true

      - name: Upload to Chrome Web Store
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/pull/')
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: chrome-adblock-fast-${{ steps.version.outputs.version }}.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
